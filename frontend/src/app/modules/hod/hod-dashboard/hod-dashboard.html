<div class="animate-slide-up">

  <!-- ── Page Header ─────────────────────────────────────────────── -->
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-5 gap-3">
    <div>
      <h1 class="fw-900 text-slate-900 mb-2 display-5 text-uppercase" style="letter-spacing: -1px;">
        <i class="bi bi-building text-accent me-2"></i>
        {{ stats().department || 'DEPARTMENT' }}
      </h1>
      <p class="text-slate-500 fs-5 mb-0">
        Welcome back, <strong>{{ hodName() }}</strong>. Here's your department at a glance.
      </p>
    </div>
  </div>

  <!-- Loading skeleton -->
  <div *ngIf="isLoading()" class="d-flex align-items-center gap-3 mb-5 text-slate-400">
    <div class="spinner-border spinner-border-sm text-accent" role="status"></div>
    <span>Loading department data…</span>
  </div>

  <!-- ── Stats Cards ──────────────────────────────────────────────── -->
  <div class="row g-4 mb-5">
    <div class="col-xl-3 col-md-6">
      <app-stats-card
        title="Total Students"
        [value]="stats().total_students"
        icon="bi-people-fill"
        color="accent">
      </app-stats-card>
    </div>
    <div class="col-xl-3 col-md-6">
      <app-stats-card
        title="Faculty Members"
        [value]="stats().total_faculty"
        icon="bi-person-badge-fill"
        color="highlight">
      </app-stats-card>
    </div>
    <div class="col-xl-3 col-md-6">
      <app-stats-card
        title="Avg. Attendance"
        [value]="stats().attendance_percentage + '%'"
        icon="bi-calendar-check-fill"
        color="success">
      </app-stats-card>
    </div>
    <div class="col-xl-3 col-md-6">
      <app-stats-card
        title="Dept. Avg CGPA"
        [value]="stats().avg_cgpa"
        icon="bi-award-fill"
        color="info">
      </app-stats-card>
    </div>
  </div>

  <!-- ── Main Content Row ─────────────────────────────────────────── -->
  <div class="row g-5 mb-5">
    
    <!-- Pass Percentage (Full Width) -->
    <div class="col-12 d-flex flex-column gap-4">
      <div class="card-premium rounded-4 p-4 h-100">
        <h5 class="fw-800 text-slate-900 mb-1">
          <i class="bi bi-trophy-fill text-accent me-2"></i>Overall Pass Percentage
        </h5>
        <p class="text-slate-400 small mb-4">Percentage of students passing all courses</p>

        <div class="d-flex align-items-end gap-3 mb-3 mt-auto">
          <span class="display-5 fw-800 text-success">
            {{ stats().pass_percentage }}%
          </span>
        </div>

        <div class="hod-progress-track mb-2">
          <div class="hod-progress-fill bg-success"
               [style.width.%]="stats().pass_percentage">
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
