<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="fw-bold mb-0">Academic Results</h2>
  <div class="bg-primary-custom text-white px-4 py-2 rounded-pill shadow-sm">
    <span class="small opacity-75">Current CGPA:</span>
    <span class="fw-bold ms-2 fs-5">{{ cgpa() }}</span>
  </div>
</div>

<div class="card border-0 shadow-sm">
  <div class="card-body p-0">
    <div *ngIf="isLoading()" class="p-5 text-center">
      <div class="spinner-border text-primary"></div>
      <p class="mt-2 text-muted">Fetching results...</p>
    </div>

    <div class="table-responsive" *ngIf="!isLoading()">
      <table class="table table-hover align-middle mb-0">
        <thead class="bg-light text-muted">
          <tr>
            <th>Course Name</th>
            <th>Marks</th>
            <th>Total</th>
            <th class="text-center">Grade</th>
            <th class="text-center">Grade Point</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let res of results()">
            <td class="fw-medium text-dark">{{ res.course_name }}</td>
            <td>{{ res.marks_obtained }}</td>
            <td>{{ res.total_marks }}</td>
            <td class="text-center">
              <span class="badge" [ngClass]="{
                'bg-success': res.grade === 'S' || res.grade === 'A',
                'bg-info': res.grade === 'B' || res.grade === 'C',
                'bg-warning': res.grade === 'D',
                'bg-danger': res.grade === 'F'
              }">{{ res.grade }}</span>
            </td>
            <td class="text-center fw-bold">{{ res.gpa }}</td>
          </tr>
          <tr *ngIf="results().length === 0">
            <td colspan="5" class="text-center p-4 text-muted">No results available yet.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
