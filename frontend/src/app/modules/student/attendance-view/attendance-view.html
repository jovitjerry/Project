<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="fw-bold mb-0">My Attendance</h2>
  <button class="btn btn-outline-primary btn-sm" (click)="loadReport()">
    <i class="bi bi-arrow-clockwise me-1"></i>Refresh
  </button>
</div>

<div class="row g-4 mb-4" *ngIf="!isLoading()">
  <div class="col-md-4" *ngFor="let report of attendanceReport()">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-body">
        <h6 class="text-muted small fw-bold text-uppercase mb-3">{{ report.course_name }}</h6>
        <div class="d-flex justify-content-between align-items-end">
          <div>
            <h3 class="fw-bold mb-1">{{ report.attendance_percentage }}%</h3>
            <p class="text-muted small mb-0">{{ report.present_count }} / {{ report.total_classes }} Classes</p>
          </div>
          <div class="progress-circle" [style.--value]="report.attendance_percentage" [class.text-danger]="report.attendance_percentage < 75" [class.text-success]="report.attendance_percentage >= 75">
            <i class="bi" [ngClass]="report.attendance_percentage >= 75 ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill'"></i>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div *ngIf="isLoading()" class="text-center p-5">
  <div class="spinner-border text-primary" role="status"></div>
  <p class="mt-2 text-muted">Calculating attendance...</p>
</div>

<div class="card border-0 shadow-sm" *ngIf="!isLoading() && attendanceReport().length === 0">
  <div class="card-body text-center p-5 text-muted">
    <i class="bi bi-calendar-x fs-1 mb-3 d-block"></i>
    No attendance records found yet.
  </div>
</div>
